# CI workflow: build the project and validate that the Docker image builds.
#
# IMPORTANT: this workflow does NOT deploy to AWS. It only proves the code
# installs, tests pass (when tests exist), and the Docker image builds. The
# steps to deploy to ECS later are documented (commented) at the bottom and in
# deployment/github-actions-guide.md.

name: CI - Build and Validate

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:        # lets you run it manually from the Actions tab

jobs:
  build-and-validate:
    name: Build and validate
    runs-on: ubuntu-latest

    steps:
      # 1. Get the repository code onto the runner
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Install Python 3.10 (matches the project and the Docker image)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      # 3. Install the project dependencies
      - name: Install requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Run tests only if any exist (tests/ may be empty for now)
      - name: Run tests (if any)
        run: |
          if ls tests/test_*.py >/dev/null 2>&1 || ls tests/*_test.py >/dev/null 2>&1; then
            echo "Tests found - running pytest"
            pip install pytest
            pytest -q
          else
            echo "No tests found in tests/ - skipping."
          fi

      # 5. Build the Docker image (the same Dockerfile used for AWS)
      - name: Build Docker image
        run: docker build -t image-caption-generator:ci .

      # 6. Validate the build succeeded
      - name: Validate build
        run: |
          docker images image-caption-generator:ci
          echo "✅ Docker image built successfully."

